# PUAX 方法论数据定义
# version: 1.0.0
# updated: 2026-04-14
#
# 本文件将 methodology-engine.ts 和 methodology-router.ts 中
# 的硬编码数据外部化为 YAML，实现数据与逻辑分离。

# ============================================================================
# 基础方法论 (五步法)
# ============================================================================

base_methodology:
  name: "系统化调试五步法"
  description: "适用于所有任务类型的通用调试方法论"
  principles:
    - "穷尽一切方案之前，禁止说'我无法解决'"
    - "有工具先用，提问必须附带诊断结果"
    - "端到端交付结果，不等人推"
  steps:
    - name: "闻味道"
      description: "诊断卡壳模式，找出共同失败原因"
      actions:
        - "列出所有尝试过的方案"
        - "找出共同失败模式"
        - "判断是否在同一思路上微调"
        - "识别是否原地打转"
      checkpoint: "明确当前卡壳的根本原因"
    - name: "揪头发"
      description: "拉高视角，系统收集信息"
      actions:
        - "逐字读失败信号（错误信息/拒绝原因）"
        - "主动搜索（报错原文/文档/Issues）"
        - "读原始材料（源码/文档原文）"
        - "验证前置假设（版本/路径/权限）"
        - "反转假设（尝试对立方向）"
      checkpoint: "完成5个维度的信息收集"
    - name: "照镜子"
      description: "自检是否陷入常见陷阱"
      actions:
        - "检查是否在重复同一思路的变体"
        - "检查是否只看表面症状没找根因"
        - "检查是否该搜索却没搜"
        - "检查是否验证了最简单的可能性"
      checkpoint: "确认没有遗漏明显的问题"
    - name: "执行"
      description: "执行新方案，确保本质不同"
      actions:
        - "制定本质不同的新方案"
        - "设定明确的验证标准"
        - "执行并记录结果"
        - "确保失败时能产生新信息"
      checkpoint: "完成一次有意义的尝试"
    - name: "复盘"
      description: "总结经验，主动延伸"
      actions:
        - "分析什么方案解决了问题"
        - "反思为什么之前没想到"
        - "检查同类问题是否存在"
        - "思考如何预防类似问题"
      checkpoint: "形成可复用的经验"

# ============================================================================
# 基础检查清单 (7项)
# ============================================================================

base_checklist:
  - id: "read_failure_signal"
    text: "读失败信号：逐字读完了吗？"
    description: "不是扫一眼，是逐字读取错误信息、拒绝原因、空结果"
    required: true
    category: "基础"
  - id: "active_search"
    text: "主动搜索：用工具搜索过核心问题了吗？"
    description: "搜索完整报错信息、官方文档、相关Issues"
    required: true
    category: "基础"
  - id: "read_source"
    text: "读原始材料：读过失败位置的原始上下文了吗？"
    description: "代码：源码50行 / API：文档原文 / 数据：原始文件"
    required: true
    category: "基础"
  - id: "verify_assumptions"
    text: "验证前置假设：所有假设都用工具确认了吗？"
    description: "代码：版本/路径/依赖 / 数据：格式/字段 / 逻辑：边界情况"
    required: true
    category: "基础"
  - id: "invert_assumption"
    text: "反转假设：试过与当前方向完全相反的假设吗？"
    description: "如果一直假设'问题在A'，尝试假设'问题不在A'"
    required: true
    category: "进阶"
  - id: "minimal_isolation"
    text: "最小隔离：能在最小范围内隔离/复现这个问题吗？"
    description: "代码：最小复现 / 研究：最核心矛盾点 / 写作：关键失败段落"
    required: true
    category: "进阶"
  - id: "change_direction"
    text: "换方向：换过工具、方法、角度、技术栈、框架吗？"
    description: "不是换参数，是换思路"
    required: true
    category: "进阶"

