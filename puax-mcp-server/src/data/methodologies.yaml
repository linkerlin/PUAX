    keywords: ["简化", "砍环节", "最短路径"]
    suitable_tasks: ["building"]
    effective_against: ["spinning"]
    steps: ["识别冗余", "砍掉中间环节", "直达目标"]
    switch_to_on_failure: ["huawei-rca"]

  xiaomi-focus:
