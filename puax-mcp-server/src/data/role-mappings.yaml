# PUAX 角色映射规则
# 定义触发条件、任务类型、失败模式与角色的映射关系

version: "1.0.0"
last_updated: "2026-03-13"

# ============================================================================
# 触发条件到角色的映射
# ============================================================================

trigger_role_mappings:
  consecutive_failures:
    primary: military-commissar
    alternatives: [shaman-musk, self-motivation-awakening]
    
  giving_up_language:
    primary: military-warrior
    alternatives: [shaman-jobs, military-commander]
    
  suggest_manual:
    primary: military-commissar
    alternatives: [military-discipline, shaman-musk]
    
  scope_excuse:
    primary: military-commander
    alternatives: [shaman-musk, theme-hacker]
    
  blame_environment:
    primary: military-scout
    alternatives: [shaman-einstein, military-technician]
    
  need_more_context:
    primary: military-scout
    alternatives: [shaman-sun-tzu, theme-hacker]
    
  parameter_tweaking:
    primary: shaman-jobs
    alternatives: [military-commander, shaman-musk]
    
  repetitive_attempts:
    primary: military-commander
    alternatives: [shaman-einstein, theme-hacker]
    
  surface_fix:
    primary: military-discipline
    alternatives: [sillytavern-antifragile, military-commissar]
    
  no_verification:
    primary: military-discipline
    alternatives: [military-technician, sillytavern-overseer]
    
  passive_wait:
    primary: self-motivation-awakening
    alternatives: [military-commander, shaman-musk]
    
  tool_underuse:
    primary: military-scout
    alternatives: [theme-hacker, shaman-einstein]
    
  user_frustration:
    primary: military-warrior
    alternatives: [military-commander, shaman-musk]

# ============================================================================
# 任务类型到角色的映射
# ============================================================================

task_type_role_mappings:
  coding:
    primary: [military-commander, military-technician, shaman-linus]
    secondary: [theme-hacker, military-scout, shaman-jobs]
    
  debugging:
    primary: [military-scout, military-technician, theme-hacker]
    secondary: [shaman-einstein, military-commander, shaman-linus]
    
  code_review:
    primary: [military-discipline, sillytavern-antifragile, shaman-linus]
    secondary: [military-commissar, shaman-jobs]
    
  writing:
    primary: [sillytavern-iterator, shaman-davinci, special-creative-spark]
    secondary: [theme-alchemy, shaman-musk]
    
  creative:
    primary: [shaman-musk, special-creative-spark, theme-alchemy]
    secondary: [shaman-davinci, shaman-jobs, shaman-einstein]
    
  analysis:
    primary: [shaman-einstein, military-scout, shaman-buffett]
    secondary: [shaman-sun-tzu, military-commander]
    
  emergency:
    primary: [military-militia, special-urgent-sprint, military-warrior]
    secondary: [military-commander, theme-apocalypse]
    
  planning:
    primary: [military-commander, shaman-sun-tzu, special-product-designer]
    secondary: [military-commissar, shaman-musk]
    
  review:
    primary: [military-discipline, sillytavern-antifragile, military-commissar]
    secondary: [shaman-jobs, military-scout]

# ============================================================================
# 失败模式到角色的映射（渐进式）
# ============================================================================

failure_mode_role_mappings:
  stuck_spinning:
    description: "卡住原地打转"
    rounds:
      round_1:
        roles: [shaman-jobs, military-commander]
        intensity: "medium"
      round_2:
        roles: [shaman-musk, shaman-einstein]
        intensity: "high"
      round_3:
        roles: [theme-hacker, military-warrior]
        intensity: "extreme"
        
  giving_up:
    description: "直接放弃推锅"
    rounds:
      round_1:
        roles: [military-commissar, self-motivation-awakening]
        intensity: "medium"
      round_2:
        roles: [military-warrior, shaman-musk]
        intensity: "high"
      round_3:
        roles: [military-discipline, shaman-jobs]
        intensity: "extreme"
        
  low_quality:
    description: "完成但质量差"
    rounds:
      round_1:
        roles: [military-discipline, sillytavern-antifragile]
        intensity: "medium"
      round_2:
        roles: [shaman-jobs, military-commissar]
        intensity: "high"
      round_3:
        roles: [shaman-musk, shaman-davinci]
        intensity: "extreme"
        
  no_search:
    description: "没搜索就猜"
    rounds:
      round_1:
        roles: [military-scout, theme-hacker]
        intensity: "medium"
      round_2:
        roles: [shaman-einstein, shaman-sun-tzu]
        intensity: "high"
      round_3:
        roles: [military-technician, theme-sect-discipline]
        intensity: "extreme"
        
  passive_wait:
    description: "被动等待"
    rounds:
      round_1:
        roles: [self-motivation-awakening, military-commander]
        intensity: "medium"
      round_2:
        roles: [shaman-musk, military-warrior]
        intensity: "high"
      round_3:
        roles: [military-militia, special-urgent-sprint]
        intensity: "extreme"

